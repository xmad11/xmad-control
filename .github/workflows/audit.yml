name: Audit & Build

on:
  push:
    branches: [main, develop, main-ui-plus-audit]
  pull_request:
    branches: [main, develop]

jobs:
  audit:
    name: Full Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Run FULL audit in CI (not during local dev)
      - name: Run full 11-layer audit
        run: bun run audit:ci

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: .audit/audit-report.json
          retention-days: 30

      - name: Upload UI normalization report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-normalization-report
          path: .audit/ui-normalization-report.json
          retention-days: 30

      - name: Generate dashboard
        if: always()
        run: bun run scripts/generate-dashboard.ts

      - name: Upload dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-dashboard
          path: .audit/dashboard.html

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            try {
              const report = JSON.parse(fs.readFileSync('.audit/audit-report.json', 'utf8'));

              const summary = `
              ## 🔍 Audit Results

              | Metric | Value |
              |--------|-------|
              | Total Layers | ${report.summary.total} |
              | ✅ Passed | ${report.summary.passed} |
              | ⚠️ Warnings | ${report.summary.warned} |
              | ❌ Failed | ${report.summary.failed} |
              | 📊 Violations | ${report.summary.totalViolations} |
              | 🔴 Critical | ${report.summary.criticalViolations} |

              ${report.summary.failed > 0 ? '### ❌ Audit Failed\n\nFix violations before merging.' : '### ✅ All Checks Passed'}

              <details>
              <summary>View detailed report</summary>

              \`\`\`json
              ${JSON.stringify(report, null, 2)}
              \`\`\`

              </details>
              `;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary
              });
            } catch (e) {
              console.log('Could not read audit report');
            }

      - name: Fail if critical violations
        run: |
          if [ -f .audit/audit-report.json ]; then
            FAILED=$(cat .audit/audit-report.json | grep -o '"failed":[0-9]*' | grep -o '[0-9]*')
            CRITICAL=$(cat .audit/audit-report.json | grep -o '"criticalViolations":[0-9]*' | grep -o '[0-9]*')
            if [ "$FAILED" -gt "0" ] || [ "$CRITICAL" -gt "0" ]; then
              echo "❌ Audit failed: $FAILED layers failed, $CRITICAL critical violations"
              exit 1
            fi
          fi

  build:
    name: Build Verification
    needs: audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: .next/
          retention-days: 7
